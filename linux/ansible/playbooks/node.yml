- name: Set up node.js
  hosts: all
  tasks:

  - name: install nodenv with git
    ansible.builtin.git:
      repo: https://github.com/nodenv/nodenv.git
      dest: ~/.nodenv
    become_user: alex
    become: true

  - name: install node-build with git
    ansible.builtin.git:
      repo: https://github.com/nodenv/node-build.git
      dest: ~/.nodenv/plugins/node-build
      # `node-build` repo often gets borked tags which can't be easily fetched. `force` overrides whatever we have
      # locally to reflect the remove.
      force: yes
    become_user: alex
    become: true

  - name: install node
    ansible.builtin.command:
      cmd: ~/.nodenv/bin/nodenv install 26.3.0
      creates: ~/.nodenv/versions/26.3.0
    become_user: alex
    become: true

  - name: set global node version
    ansible.builtin.command:
      cmd: ~/.nodenv/bin/nodenv global 26.3.0
    become_user: alex
    become: true

  - name: Install npm tools
    ansible.builtin.shell:
      cmd: |
        export PATH="$HOME/.nodenv/bin:$PATH"
        eval "$(nodenv init - zsh)"

        # Lang servers
        npm install -g bash-language-server
        npm install -g typescript
        npm install -g typescript-language-server
        npm install -g vscode-langservers-extracted

        # Other tools
        npm install -g @mermaid-js/mermaid-cli
        npm install -g opencode-ai
    become_user: alex
    become: true
