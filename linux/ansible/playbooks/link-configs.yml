- name: Clone and link dotfiles
  hosts: all
  tasks:

  - name: clone dotfiles
    git:
      repo: git@github.com:alexjuda/dotfiles.git
      dest: ~/Code/dotfiles
      clone: yes
      update: no
    become_user: alex
    become: true

  - name: clone opencode memory
    git:
      repo: git@github.com:alexjuda/opencode-memory.git
      dest: ~/Code/ai/opencode-memory
    become_user: alex
    become: true

  - name: clone opencode skills
    git:
      repo: git@github.com:alexjuda/skills.git
      dest: ~/Code/ai/skills
    become_user: alex
    become: true

  - name: link configs
    block:
      - name: link kitty config
        ansible.builtin.file:
          src: ~/Code/dotfiles/config/kitty
          dest: ~/.config/kitty
          state: link

      - name: link wezterm config
        ansible.builtin.file:
          src: ~/Code/dotfiles/config/wezterm
          dest: ~/.config/wezterm
          state: link

      - name: link neovim config
        ansible.builtin.file:
          src: ~/Code/dotfiles/config/nvim
          dest: ~/.config/nvim
          state: link

      - name: make ghostty config dir
        ansible.builtin.file:
          path: ~/.config/ghostty
          state: directory

      - name: link main ghostty config
        ansible.builtin.file:
          src: ~/Code/dotfiles/config/ghostty/config
          dest: ~/.config/ghostty/config
          state: link

      - name: link platform-specific ghostty config
        ansible.builtin.file:
          src: ~/Code/dotfiles/config/ghostty/linux_config
          dest: ~/.config/ghostty/platform_specific_config
          state: link

      - name: create opencode config directory
        ansible.builtin.file:
          path: ~/.config/opencode
          state: directory

      - name: link opencode config file
        ansible.builtin.file:
          src: ~/Code/dotfiles/config/opencode/opencode.json
          dest: ~/.config/opencode/opencode.json
          state: link

      - name: link opencode AGENTS.md
        ansible.builtin.file:
          src: ~/Code/dotfiles/config/opencode/AGENTS.md
          dest: ~/.config/opencode/AGENTS.md
          state: link

      - name: link opencode commands
        ansible.builtin.file:
          src: ~/Code/dotfiles/config/opencode/commands
          dest: ~/.config/opencode/commands
          state: link

      - name: link opencode memory
        ansible.builtin.file:
          src: ~/Code/ai/opencode-memory
          dest: ~/.config/opencode/memory
          state: link

      - name: link opencode skills
        ansible.builtin.file:
          src: ~/Code/ai/skills/skills
          dest: ~/.config/opencode/skills
          state: link

      - name: link k9s config
        ansible.builtin.file:
          src: ~/Code/dotfiles/config/k9s
          dest: ~/.config/k9s
          state: link

      - name: link starship config file
        ansible.builtin.file:
          src: ~/Code/dotfiles/config/starship.toml
          dest: ~/.config/starship.toml
          state: link

      - name: link yazi config
        ansible.builtin.file:
          src: ~/Code/dotfiles/config/yazi
          dest: ~/.config/yazi
          state: link

      - name: link zsh config
        ansible.builtin.file:
          src: ~/Code/dotfiles/macos/.zshrc
          dest: ~/.zshrc
          state: link

      - name: link aliases
        ansible.builtin.file:
          src: ~/Code/dotfiles/linux/.bash_aliases
          dest: ~/.bash_aliases
          state: link
    become_user: alex
    become: true

  - name: clone zsh lazyload
    git:
      repo: https://github.com/qoomon/zsh-lazyload.git
      dest: ~/.local/share/aj-apps/zsh-lazyload
    become_user: alex
    become: true

  - name: clone notes
    git:
      repo: git@github.com:alexjuda/notes-synced.git
      dest: ~/Documents/notes-synced
    become_user: alex
    become: true
